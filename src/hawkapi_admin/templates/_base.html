<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>{% block title %}{{ admin.title }}{% endblock %}</title>
<style>
:root { color-scheme: light dark; --bg:#fff; --fg:#111; --muted:#666; --line:#e2e2e2; --link:#2563eb; --danger:#c0392b; }
@media (prefers-color-scheme: dark) { :root { --bg:#0e0e0e; --fg:#eee; --muted:#999; --line:#222; --link:#60a5fa; --danger:#e74c3c; } }
* { box-sizing: border-box; }
body { font: 14px/1.5 system-ui, sans-serif; background: var(--bg); color: var(--fg); margin: 0; }
header { padding: 12px 24px; border-bottom: 1px solid var(--line); display: flex; align-items: center; gap: 16px; }
header h1 { font-size: 16px; margin: 0; }
header nav a { color: var(--muted); text-decoration: none; margin-right: 12px; }
header nav a:hover { color: var(--fg); }
main { padding: 24px; max-width: 1100px; margin: 0 auto; }
a { color: var(--link); }
table { width: 100%; border-collapse: collapse; }
th, td { padding: 8px 10px; text-align: left; border-bottom: 1px solid var(--line); }
th { font-weight: 600; color: var(--muted); }
tr:hover { background: rgba(127,127,127,.06); }
form { display: grid; gap: 12px; max-width: 640px; }
label { display: block; font-weight: 500; }
input, textarea, select { width: 100%; padding: 8px; border: 1px solid var(--line); border-radius: 6px; background: var(--bg); color: var(--fg); font: inherit; }
textarea { min-height: 120px; }
button, .button { background: var(--link); color: #fff; border: 0; padding: 8px 16px; border-radius: 6px; cursor: pointer; text-decoration: none; display: inline-block; font: inherit; }
button.secondary, .button.secondary { background: transparent; color: var(--fg); border: 1px solid var(--line); }
button.danger, .button.danger { background: var(--danger); }
.actions { display: flex; gap: 8px; margin-top: 12px; }
.muted { color: var(--muted); }
.pagination { margin-top: 16px; display: flex; gap: 8px; }
.empty { padding: 32px; text-align: center; color: var(--muted); }
.search { margin-bottom: 16px; display: flex; gap: 8px; }
.search input { max-width: 320px; }
.breadcrumb { color: var(--muted); margin-bottom: 12px; }
.breadcrumb a { color: var(--muted); }
.field-row { display: grid; grid-template-columns: 200px 1fr; gap: 12px; padding: 8px 0; border-bottom: 1px solid var(--line); }
</style>
</head>
<body>
<header>
  <h1><a href="{{ admin.url_prefix }}" style="color:inherit;text-decoration:none">{{ admin.title }}</a></h1>
  <nav>
    {% for res in admin.resources.values() %}
    <a href="{{ admin.url_prefix }}/{{ res.name }}">{% if res.icon %}{{ res.icon }} {% endif %}{{ res.label_plural }}</a>
    {% endfor %}
  </nav>
</header>
<main>
{% block content %}{% endblock %}
</main>
</body>
</html>
